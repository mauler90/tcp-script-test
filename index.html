<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.R.C. — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #001830; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; }
  .card { background: #002856; border-radius: 12px; padding: 36px 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo h1 { color: #bdf3fc; font-size: 22px; letter-spacing: 2px; }
  .logo p { color: #7ab8d4; font-size: 12px; margin-top: 4px; }
  label { display: block; font-size: 12px; color: #7ab8d4; margin-bottom: 4px; margin-top: 16px; }
  input { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #1a4a7a; background: #001830; color: #eee; font-size: 14px; }
  input:focus { outline: none; border-color: #bdf3fc; }
  button { width: 100%; margin-top: 24px; padding: 12px; background: #1a65b8; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
  button:hover { background: #2a75c8; }
  button:disabled { background: #555; cursor: not-allowed; }
  #msg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 20px; }
  .err { color: #ff6b6b; }
  .ok { color: #5dfc82; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>S.R.C.</h1>
    <p>Script Riutilizzo Container — C.r.t.</p>
  </div>
  <label>Email</label>
  <input id="email" type="email" placeholder="la tua email" autocomplete="email">
  <label>Password</label>
  <input id="password" type="password" placeholder="password" autocomplete="current-password">
  <button id="btn-login" onclick="doLogin()">Accedi</button>
  <div id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://rdjldluwqijjahnqqdur.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkamxkbHV3cWlqamFobnFxZHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDcyMjYsImV4cCI6MjA5NjIyMzIyNn0.TzOGtBntu8aRuGn3bG2KoRg6i_Z_uHsuz1T45tAhon4';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn-login');

  if (!email || !password) { msg.innerHTML = '<span class="err">Compila tutti i campi.</span>'; return; }

  btn.disabled = true;
  btn.textContent = 'Accesso in corso...';
  msg.innerHTML = '';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    msg.innerHTML = `<span class="err">${error.message}</span>`;
    btn.disabled = false;
    btn.textContent = 'Accedi';
    return;
  }

  // Salva il token e reindirizza alla webapp
  localStorage.setItem('src_token', data.session.access_token);
  localStorage.setItem('src_user_id', data.user.id);
  msg.innerHTML = '<span class="ok">Accesso effettuato. Caricamento...</span>';
  setTimeout(() => { window.location.href = '/app.html'; }, 800);
}

// Se già loggato, vai diretto all'app
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    localStorage.setItem('src_token', data.session.access_token);
    localStorage.setItem('src_user_id', data.user?.id || '');
    window.location.href = '/app.html';
  }
})();
</script>
</body>
</html>
